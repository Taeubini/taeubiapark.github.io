<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TAEUBIA</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Montserrat',sans-serif;
    background:#eef7ff;
    color:#16324f;
    /* Verhindert horizontales Scrollen durch Sterne am Rand */
    overflow-x: hidden; 
}

/* Navigation */

nav{
    position:fixed;
    top:0;
    width:100%;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(37,99,235,0.95);
    backdrop-filter:blur(10px);
    z-index:1000;
    transition: all 0.3s ease;
}

.logo{
    font-size:2rem;
    font-weight:900;
    letter-spacing:4px;
    color:white;
}

nav ul{
    display:flex;
    list-style:none;
    gap:30px;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:600;
    transition: color 0.2s;
}

nav a:hover {
    color: #bae6fd;
}

/* Hero */

.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding-top: 80px;

    background:
    linear-gradient(
        rgba(59,130,246,0.45),
        rgba(125,211,252,0.35)
    ),
    url("https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=2000");

    background-size:cover;
    background-position:center;
}

.hero-content{
    background:rgba(255,255,255,0.9);
    padding:60px;
    border-radius:30px;
    max-width:900px;
    margin: 0 20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.hero h1{
    font-size:5rem;
    color:#2563eb;
    margin-bottom:20px;
    line-height: 1.1;
}

.hero p{
    font-size:1.4rem;
    line-height:1.7;
    color:#334155;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:18px 40px;
    background:#2563eb;
    color:white;
    border-radius:999px;
    text-decoration:none;
    font-weight:700;
    transition: transform 0.2s, background 0.2s;
}

.btn:hover {
    background: #1d4ed8;
    transform: translateY(-2px);
}

/* Sections */

section{
    padding:100px 8%;
}

.section-title{
    text-align:center;
    font-size:3
